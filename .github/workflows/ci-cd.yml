name: Java CLI CI/CD

# Trigger on commits or pull requests to main
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test-docker:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Setup JDK 17
      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      # Step 3: Compile project
      - name: Compile Java project
        run: |
          mkdir -p out
          javac --release 17 -d out $(find src -name "*.java")

      # Step 4: Build JAR
      - name: Build runnable JAR
        run: |
          jar cfe task-management.jar org.example.Main -C out .

      # Step 5: Run unit tests (TaskTest)
      - name: Run Unit Tests
        run: |
          curl -LO https://repo1.maven.org/maven2/org/junit/jupiter/junit-jupiter-api/5.10.0/junit-jupiter-api-5.10.0.jar
          curl -LO https://repo1.maven.org/maven2/org/junit/jupiter/junit-jupiter-engine/5.10.0/junit-jupiter-engine-5.10.0.jar
          java -cp "out:junit-jupiter-api-5.10.0.jar:junit-jupiter-engine-5.10.0.jar" \
               org.junit.platform.console.ConsoleLauncher --select-class org.example.domain.task.TaskTest

      # Step 6: Run integration tests (UserIntegrationTest)
      - name: Run Integration Tests
        run: |
          java -cp "out:junit-jupiter-api-5.10.0.jar:junit-jupiter-engine-5.10.0.jar" \
               org.junit.platform.console.ConsoleLauncher --select-class org.example.integration.UserIntegrationTest

      # Step 7: Build Docker image
      
      - name: Build Docker image
        run: |
          docker build -t task-management .

      # Step 8 (optional): Save JAR as artifact
      - name: Upload JAR Artifact
      uses: actions/upload-artifact@v4
  with:
    name: task-management-jar
    path: task-management.jar
