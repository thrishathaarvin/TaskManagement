name: Java CLI CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test-docker:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Setup JDK 17
      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      # Step 3: Compile main + test classes
      - name: Compile Java project and tests
        run: |
          mkdir -p out
          # Compile main classes
          javac --release 17 -d out $(find src/main/java -name "*.java")
          # Compile test classes (use out as classpath for main classes)
          javac --release 17 -cp out -d out $(find src/test/java -name "*.java")

      # Step 4: Build runnable JAR
      - name: Build runnable JAR
        run: |
          jar cfe task-management.jar org.example.Main -C out .

      # Step 5: Run all tests (unit + integration)
      - name: Run Unit & Integration Tests
        run: |
          curl -LO https://repo1.maven.org/maven2/org/junit/platform/junit-platform-console-standalone/1.10.0/junit-platform-console-standalone-1.10.0.jar
          java -jar junit-platform-console-standalone-1.10.0.jar --class-path out --scan-class-path

      # Step 6: Build Docker image
      - name: Build Docker image
        run: |
          docker build -t task-management .

      # Step 7: Upload JAR artifact
      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: task-management-jar
          path: task-management.jar
